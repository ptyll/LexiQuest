<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LexiQuest - Offline</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f5f5f5;
            color: #333;
        }
        .offline-container {
            text-align: center;
            padding: 2rem;
            max-width: 400px;
        }
        .offline-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: #FF9800;
        }
        p {
            color: #666;
            margin-bottom: 1.5rem;
        }
        .retry-btn {
            padding: 0.75rem 1.5rem;
            background: #FF9800;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .retry-btn:hover {
            background: #F57C00;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">&#x1F4F5;</div>
        <h1>Jsi offline</h1>
        <p>Nemohli jsme se připojit k serveru. Zkontroluj své připojení k internetu a zkus to znovu.</p>
        <button class="retry-btn" onclick="window.location.reload()">Zkusit znovu</button>
    </div>
</body>
</html>
